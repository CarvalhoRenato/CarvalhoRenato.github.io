<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* ========================
   MENU
======================== */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

.badge {
  margin-left: 6px;
}

/* ========================
   SEARCH
======================== */
.search {
  position: relative;
}

.search input {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 14px 14px 38px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
  font-size: 16px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
}

/* ========================
   GRID
======================== */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* ========================
   CARD
======================== */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

/* ========================
   BUTTONS
======================== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: 500;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* ========================
   REPORT BUTTON (MELHORADO)
======================== */
.report-btn {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid #FECACA;
  background: #FEF2F2;
  color: #B91C1C;
  cursor: pointer;
}

/* ========================
   HEALTH
======================== */
.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px; /* 🔥 separação maior */
}

.arrow {
  cursor: pointer;
  transition: transform 0.2s;
}

.arrow.open {
  transform: rotate(90deg);
}

.services {
  display: none;
  margin-top: 10px;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* ========================
   WATERMARK
======================== */
.watermark {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94A3B8;
}
</style>
</head>

<body>

<div class="container">

  <div class="menu">
    <button class="menu-item active" onclick="showPage('home')">Home</button>
    <button class="menu-item" onclick="showPage('deeplinks')">Deeplinks</button>
    <button class="menu-item" onclick="showPage('health')">
      Health <span id="health-badge" class="badge"></span>
    </button>
  </div>

  <div id="home-page">
    <h1>QA Portal 🧪</h1>
    <p style="color:#64748B;">
      Central de testes e validação de ambientes
    </p>

    <div class="grid">
      <div class="card">
        <div class="title">🔗 Deeplinks</div>
        <div class="buttons">
          <button class="btn ios" onclick="showPage('deeplinks')">Acessar</button>
        </div>
      </div>

      <div class="card">
        <div class="title">🚦 Health</div>
        <div class="buttons">
          <button class="btn android" onclick="showPage('health')">Ver status</button>
        </div>
      </div>
    </div>
  </div>

  <div id="deeplinks-page" style="display:none;">
    <h1>Deeplinks</h1>

    <div class="search">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="Buscar..." />
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div id="health-page" style="display:none;">
    <h1>Health 🚦</h1>
    <div class="grid" id="health-grid"></div>
  </div>

</div>

<div class="watermark">Desenvolvido por Chapter QA</div>

<script>

// NAV
function showPage(page) {
  document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
  document.getElementById('deeplinks-page').style.display = page === 'deeplinks' ? 'block' : 'none';
  document.getElementById('health-page').style.display = page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'home') document.querySelectorAll('.menu-item')[0].classList.add('active');
  if (page === 'deeplinks') document.querySelectorAll('.menu-item')[1].classList.add('active');

  if (page === 'health') {
    document.querySelectorAll('.menu-item')[2].classList.add('active');
    loadHealth();
  }
}

// HEALTH
const environments = [
  {
    name: "PRD",
    services: [
      { name: "Home API", url: "https://www.petz.com.br/home/api/readiness" },
      { name: "Fake OK", url: "https://www.petz.com.br/home/api/readiness" },
      { name: "Fake FAIL", url: "https://fake-url/test" }
    ]
  }
];

async function loadHealth() {

  const grid = document.getElementById("health-grid");

  grid.innerHTML = "";

  for (const env of environments) {

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "toggle";

    const left = document.createElement("div");
    left.className = "header-left";

    const right = document.createElement("div");
    right.className = "header-right";

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = env.name;

    const arrow = document.createElement("div");
    arrow.className = "arrow";
    arrow.innerText = "▶";

    const reportBtn = document.createElement("button");
    reportBtn.className = "report-btn";
    reportBtn.innerText = "Reportar";

    left.appendChild(title);
    right.appendChild(reportBtn);
    right.appendChild(arrow);

    header.appendChild(left);
    header.appendChild(right);

    const servicesContainer = document.createElement("div");
    servicesContainer.className = "services";

    card.appendChild(header);
    card.appendChild(servicesContainer);
    grid.appendChild(card);

    arrow.onclick = () => {
      servicesContainer.classList.toggle("open");
      arrow.classList.toggle("open");
    };

    for (const service of env.services) {
      const el = document.createElement("div");
      el.className = "service";
      el.innerHTML = `<span>${service.name}</span><span>🟢</span>`;
      servicesContainer.appendChild(el);
    }
  }
}

</script>

</body>
</html>
