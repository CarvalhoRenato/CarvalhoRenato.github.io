<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
  position: relative;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

/* BADGE */
.badge {
  margin-left: 6px;
  font-weight: 600;
}

/* RESTO */
.search input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
}

.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: 500;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* HEALTH */
.toggle {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.arrow {
  transition: transform 0.2s;
}

.arrow.open {
  transform: rotate(90deg);
}

.services {
  display: none;
  margin-top: 10px;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.status-ok { color: #16A34A; }
.status-warn { color: #D97706; }
.status-bad { color: #DC2626; }
</style>
</head>

<body>

<div class="container">

  <!-- MENU -->
  <div class="menu">
    <button class="menu-item active" onclick="showPage('deeplinks')">Deeplinks</button>
    <button class="menu-item" onclick="showPage('health')">
      Health <span id="health-badge" class="badge"></span>
    </button>
  </div>

  <!-- DEEPLINKS -->
  <div id="deeplinks-page">
    <h1>Deeplinks</h1>

    <div class="search">
      <input id="search" placeholder="Buscar..." />
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- HEALTH -->
  <div id="health-page" style="display:none;">
    <h1>Health 🚦</h1>
    <div class="grid" id="health-grid"></div>
  </div>

</div>

<script>
// NAV
function showPage(page) {
  document.getElementById('deeplinks-page').style.display =
    page === 'deeplinks' ? 'block' : 'none';

  document.getElementById('health-page').style.display =
    page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'deeplinks') document.querySelectorAll('.menu-item')[0].classList.add('active');

  if (page === 'health') {
    document.querySelectorAll('.menu-item')[1].classList.add('active');
    loadHealth();
  }
}

// ========================
// DEEPLINKS
// ========================
const deeplinks = [
  { title: "Produto", android: "petz://produto/tapete-higienico-petz-para-caes-superabsorvente-149767", ios: "petz://produto/tapete-higienico-petz-para-caes-superabsorvente-149767&action_type=2" }
];

const grid = document.getElementById("grid");

function render(list) {
  grid.innerHTML = "";
  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="buttons">
        <a class="btn android" href="${item.android}">Android</a>
        <a class="btn ios" href="${item.ios}">iOS</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

render(deeplinks);

// ========================
// HEALTH CONFIG
// ========================
const environments = [
  {
    name: "PRD",
    services: [
      { name: "Home API", url: "https://www.petz.com.br/home/api/readiness" },
      { name: "Checkout API", url: "https://fake-url/checkout" },
      { name: "Auth API", url: "https://fake-url/auth" }
    ]
  }
];

// ========================
// HEALTH
// ========================
async function loadHealth() {
  const grid = document.getElementById("health-grid");
  const badge = document.getElementById("health-badge");

  grid.innerHTML = "";

  let globalFailed = 0;
  let globalTotal = 0;

  for (const env of environments) {

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "toggle";

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = env.name;

    const arrow = document.createElement("div");
    arrow.className = "arrow";
    arrow.innerText = "▶";

    header.appendChild(title);
    header.appendChild(arrow);

    const servicesContainer = document.createElement("div");
    servicesContainer.className = "services";

    card.appendChild(header);
    card.appendChild(servicesContainer);
    grid.appendChild(card);

    header.onclick = () => {
      servicesContainer.classList.toggle("open");
      arrow.classList.toggle("open");
    };

    let failed = 0;
    let total = env.services.length;

    for (const service of env.services) {

      globalTotal++;

      const serviceEl = document.createElement("div");
      serviceEl.className = "service";
      serviceEl.innerHTML = `<span>${service.name}</span><span>🔄</span>`;
      servicesContainer.appendChild(serviceEl);

      try {
        const res = await fetch(
          "https://corsproxy.io/?" + encodeURIComponent(service.url)
        );

        const data = await res.json();
        const isReady = data.checked === "ready";

        if (!isReady) {
          failed++;
          globalFailed++;
        }

        serviceEl.innerHTML = `
          <span>${service.name}</span>
          <span class="${isReady ? "status-ok" : "status-bad"}">
            ${isReady ? "🟢" : "🔴"}
          </span>
        `;

      } catch {
        failed++;
        globalFailed++;

        serviceEl.innerHTML = `
          <span>${service.name}</span>
          <span class="status-bad">⚠️</span>
        `;
      }
    }

    // status do ambiente
    let envStatus = document.createElement("span");

    if (failed === 0) {
      envStatus.innerText = " 🟢";
    } else if (failed < total) {
      envStatus.innerText = " 🟡";
    } else {
      envStatus.innerText = " 🔴";
    }

    title.appendChild(envStatus);
  }

  // ========================
  // BADGE GLOBAL
  // ========================
  if (globalFailed === 0) {
    badge.innerText = "🟢";
  } else if (globalFailed < globalTotal) {
    badge.innerText = "🟡";
  } else {
    badge.innerText = "🔴";
  }
}
</script>

</body>
</html>
