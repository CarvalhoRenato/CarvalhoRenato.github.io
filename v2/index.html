      padding: 16px;
      border-radius: 12px;
    }

    .title {
      font-weight: 600;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }

    .android {
      background: #DCFCE7;
      color: #166534;
    }

    .ios {
      background: #E2E8F0;
      color: #334155;
    }
