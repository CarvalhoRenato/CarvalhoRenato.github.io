<script>
// ========================
// CONFIG (ambientes)
// ========================
const environments = [
  {
    name: "PRD",
    readiness: "https://www.petz.com.br/home/api/readiness",
    version: "https://www.petz.com.br/home/version.json"
  }
];

// ========================
// LOAD HEALTH
// ========================
async function loadHealth() {
  const grid = document.getElementById("health-grid");
  grid.innerHTML = "";

  for (const env of environments) {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${env.name}</div>
      <div>🔄 Verificando...</div>
    `;

    grid.appendChild(card);

    try {
      const [readinessRes, versionRes] = await Promise.all([
        fetch(env.readiness),
        fetch(env.version)
      ]);

      const readiness = await readinessRes.json();
      const version = await versionRes.json();

      let statusHTML = "";
      let decisionHTML = "";

      if (readiness.checked === "ready") {
        statusHTML = "🟢 Ambiente pronto";
        decisionHTML = `<div style="color:#16A34A; font-weight:600;">✔️ Testes liberados</div>`;
      } else {
        statusHTML = "🔴 Ambiente não pronto";
        decisionHTML = `<div style="color:#DC2626; font-weight:600;">❌ Testes bloqueados</div>`;
      }

      card.innerHTML = `
        <div class="title">${env.name}</div>
        <div>${statusHTML}</div>
        <div style="margin-top:8px; font-size:14px; color:#64748B;">
          Versão: ${readiness.version || "-"} <br>
          Ambiente: ${readiness.env || "-"} <br>
          Último deploy: ${version.updatedAt || "-"}
        </div>
        ${decisionHTML}
      `;

    } catch (error) {
      card.innerHTML = `
        <div class="title">${env.name}</div>
        <div>⚠️ Erro ao verificar</div>
        <div style="color:#DC2626; font-weight:600;">❌ Indisponível</div>
      `;
    }
  }
}

// ========================
// NAV (override)
// ========================
function showPage(page) {
  document.getElementById('deeplinks-page').style.display =
    page === 'deeplinks' ? 'block' : 'none';

  document.getElementById('health-page').style.display =
    page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'deeplinks') {
    document.querySelectorAll('.menu-item')[0].classList.add('active');
  }

  if (page === 'health') {
    document.querySelectorAll('.menu-item')[1].classList.add('active');
    loadHealth(); // 🔥 aqui entra tudo
  }
}
</script>
