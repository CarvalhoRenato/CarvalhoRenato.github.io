<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* MENU */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

.badge {
  margin-left: 6px;
}

/* SEARCH */
.search input {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
}

/* GRID */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: 500;
  border: none;
  cursor: pointer;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* HEALTH */
.toggle {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.arrow {
  transition: transform 0.2s;
}

.arrow.open {
  transform: rotate(90deg);
}

.services {
  display: none;
  margin-top: 10px;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* WATERMARK */
.watermark {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94A3B8;
}
</style>
</head>

<body>

<div class="container">

  <!-- MENU -->
  <div class="menu">
    <button class="menu-item active" onclick="showPage('home')">Home</button>
    <button class="menu-item" onclick="showPage('deeplinks')">Deeplinks</button>
    <button class="menu-item" onclick="showPage('health')">
      Health <span id="health-badge" class="badge"></span>
    </button>
  </div>

  <!-- HOME -->
  <div id="home-page">
    <h1>QA Portal 🧪</h1>
    <p style="color:#64748B;">
      Central de testes e validação de ambientes
    </p>

    <div class="grid">
      <div class="card">
        <div class="title">🔗 Deeplinks</div>
        <div class="buttons">
          <button class="btn ios" onclick="showPage('deeplinks')">Acessar</button>
        </div>
      </div>

      <div class="card">
        <div class="title">🚦 Health</div>
        <div class="buttons">
          <button class="btn android" onclick="showPage('health')">Ver status</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DEEPLINKS -->
  <div id="deeplinks-page" style="display:none;">
    <h1>Deeplinks</h1>

    <div class="search">
      <input id="search" placeholder="Buscar..." />
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- HEALTH -->
  <div id="health-page" style="display:none;">
    <h1>Health 🚦</h1>
    <div class="grid" id="health-grid"></div>
  </div>

</div>

<div class="watermark">Desenvolvido por Chapter QA</div>

<script>
// NAV
function showPage(page) {
  document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
  document.getElementById('deeplinks-page').style.display = page === 'deeplinks' ? 'block' : 'none';
  document.getElementById('health-page').style.display = page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'home') document.querySelectorAll('.menu-item')[0].classList.add('active');
  if (page === 'deeplinks') document.querySelectorAll('.menu-item')[1].classList.add('active');

  if (page === 'health') {
    document.querySelectorAll('.menu-item')[2].classList.add('active');
    loadHealth();
  }
}

// ========================
// DEEPLINKS
// ========================
const deeplinks = [
  { title: "Produto", android: "petz://produto", ios: "petz://produto" },
  { title: "WebView", android: "petz://webview", ios: "petz://webview" },
  { title: "Coleção", android: "petz://colecao", ios: "petz://colecao" },
  { title: "Assinatura", android: "petz://assinatura", ios: "petz://assinatura" }
];

const grid = document.getElementById("grid");

function render(list) {
  grid.innerHTML = "";
  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="buttons">
        <a class="btn android" href="${item.android}">Android</a>
        <a class="btn ios" href="${item.ios}">iOS</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

render(deeplinks);

document.getElementById("search").addEventListener("input", function () {
  const value = this.value.toLowerCase();
  render(deeplinks.filter(item =>
    item.title.toLowerCase().includes(value)
  ));
});

// ========================
// HEALTH
// ========================
const environments = [
  {
    name: "PRD",
    services: [
      { name: "Home API", url: "https://www.petz.com.br/home/api/readiness" },
      { name: "Fake OK", url: "https://www.petz.com.br/home/api/readiness" },
      { name: "Fake FAIL", url: "https://fake-url/test" }
    ]
  }
];

async function loadHealth() {

  const grid = document.getElementById("health-grid");
  const badge = document.getElementById("health-badge");

  grid.innerHTML = "";

  let globalFailed = 0;
  let globalTotal = 0;

  for (const env of environments) {

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "toggle";

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = env.name;

    const arrow = document.createElement("div");
    arrow.className = "arrow";
    arrow.innerText = "▶";

    header.appendChild(title);
    header.appendChild(arrow);

    const servicesContainer = document.createElement("div");
    servicesContainer.className = "services";

    card.appendChild(header);
    card.appendChild(servicesContainer);
    grid.appendChild(card);

    header.onclick = () => {
      servicesContainer.classList.toggle("open");
      arrow.classList.toggle("open");
    };

    let failed = 0;

    for (const service of env.services) {

      globalTotal++;

      const el = document.createElement("div");
      el.className = "service";
      el.innerHTML = `<span>${service.name}</span><span>🔄</span>`;
      servicesContainer.appendChild(el);

      try {
        const res = await fetch("https://corsproxy.io/?"+encodeURIComponent(service.url));
        const data = await res.json();

        const ok = data.checked === "ready";

        if (!ok) {
          failed++;
          globalFailed++;
        }

        el.innerHTML = `
          <span>${service.name}</span>
          <span>${ok ? "🟢" : "🔴"}</span>
        `;

      } catch {
        failed++;
        globalFailed++;

        el.innerHTML = `
          <span>${service.name}</span>
          <span>⚠️</span>
        `;
      }
    }

    let status = document.createElement("span");

    if (failed === 0) status.innerText = " 🟢";
    else if (failed < env.services.length) status.innerText = " 🟡";
    else status.innerText = " 🔴";

    title.appendChild(status);
  }

  if (globalFailed === 0) badge.innerText = "🟢";
  else if (globalFailed < globalTotal) badge.innerText = "🟡";
  else badge.innerText = "🔴";
}
</script>

</body>
</html>
