<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* MENU */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

.badge {
  margin-left: 6px;
}

/* SEARCH */
.search {
  position: relative;
}

.search input {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 40px 14px 38px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
  font-size: 16px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
}

#clear-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: none;
  font-size: 16px;
  cursor: pointer;
  display: none;
}

.history {
  margin-top: 6px;
  display: none;
}

.history div {
  background: #F1F5F9;
  padding: 8px;
  border-radius: 8px;
  margin-top: 4px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: 500;
  border: none;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* HEALTH */
.toggle {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.arrow.open {
  transform: rotate(90deg);
}

.services {
  display: none;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* WATERMARK */
.watermark {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94A3B8;
}
</style>
</head>

<body>

<div class="container">

<div class="menu">
  <button class="menu-item active" onclick="showPage('home')">Home</button>
  <button class="menu-item" onclick="showPage('deeplinks')">Deeplinks</button>
  <button class="menu-item" onclick="showPage('health')">
    Health <span id="health-badge"></span>
  </button>
</div>

<!-- HOME -->
<div id="home-page">
  <h1>QA Portal 🧪</h1>
  <p style="color:#64748B;">Central de testes</p>
</div>

<!-- DEEPLINKS -->
<div id="deeplinks-page" style="display:none;">
  <h1>Deeplinks</h1>

  <div class="search">
    <span class="search-icon">🔍</span>
    <input id="search" placeholder="Buscar..." />
    <button id="clear-btn">✖</button>
    <div id="search-history" class="history"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- HEALTH -->
<div id="health-page" style="display:none;">
  <h1>Health 🚦</h1>
  <div id="health-grid" class="grid"></div>
</div>

</div>

<div class="watermark">Desenvolvido por Chapter QA</div>

<script>
// NAV
function showPage(page) {
  home.style.display = page === 'home' ? 'block' : 'none';
  deeplinks.style.display = page === 'deeplinks' ? 'block' : 'none';
  health.style.display = page === 'health' ? 'block' : 'none';

  if(page === 'health') loadHealth();
}

const home = document.getElementById('home-page');
const deeplinks = document.getElementById('deeplinks-page');
const health = document.getElementById('health-page');

// ========================
// DEEPLINKS
// ========================
const deeplinksData = [
  { title: "Produto", android: "#", ios: "#" },
  { title: "WebView", android: "#", ios: "#" },
  { title: "Coleção", android: "#", ios: "#" },
  { title: "Assinatura", android: "#", ios: "#" }
];

const grid = document.getElementById("grid");

function render(list) {
  grid.innerHTML = "";
  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="buttons">
        <a class="btn android">${item.android}</a>
        <a class="btn ios">${item.ios}</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

render(deeplinksData);

// ========================
// SEARCH (com debounce)
// ========================
const input = document.getElementById("search");
const clearBtn = document.getElementById("clear-btn");
const historyBox = document.getElementById("search-history");

let timer;

input.addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    const val = input.value.toLowerCase();
    render(deeplinksData.filter(d => d.title.toLowerCase().includes(val)));

    if(val) {
      clearBtn.style.display = "block";
      saveHistory(val);
    }
  }, 300);
});

clearBtn.onclick = () => {
  input.value = "";
  render(deeplinksData);
  clearBtn.style.display = "none";
};

function saveHistory(term) {
  let h = JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift(term);
  h = [...new Set(h)].slice(0,5);
  localStorage.setItem("h", JSON.stringify(h));
}

// ========================
// HEALTH
// ========================
const environments = [
  {
    name: "PRD",
    services: [
      { name: "API", url: "https://www.petz.com.br/home/api/readiness" }
    ]
  }
];

async function loadHealth() {
  const grid = document.getElementById("health-grid");
  grid.innerHTML = "";

  for (const env of environments) {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "toggle";

    const title = document.createElement("div");
    title.innerText = env.name;

    const arrow = document.createElement("div");
    arrow.innerText = "▶";

    const services = document.createElement("div");
    services.className = "services";

    header.onclick = () => {
      services.classList.toggle("open");
      arrow.classList.toggle("open");
    };

    header.append(title, arrow);
    card.append(header, services);
    grid.appendChild(card);

    for (const s of env.services) {
      const el = document.createElement("div");
      el.className = "service";
      el.innerHTML = `<span>${s.name}</span><span>🟢</span>`;
      services.appendChild(el);
    }
  }
}
</script>

</body>
</html>
