<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* MENU */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
}

/* SEARCH */
.search input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
  box-sizing: border-box;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
  margin-bottom: 14px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
}

.android {
  background: #DCFCE7;
}

.ios {
  background: #F1F5F9;
}
</style>
</head>

<body>

<div class="container">

  <!-- MENU -->
  <div class="menu">
    <button class="menu-item active" onclick="showPage('deeplinks')">Deeplinks</button>
    <button class="menu-item" onclick="showPage('health')">Health</button>
  </div>

  <!-- DEEPLINKS -->
  <div id="deeplinks-page">

    <h1>Deeplinks</h1>

    <div class="search">
      <input id="search" placeholder="Buscar..." />
    </div>

    <div class="grid">

      <div class="card">
        <div class="title">Produto</div>
        <div class="buttons">
          <a class="btn android" href="#">Android</a>
          <a class="btn ios" href="#">iOS</a>
        </div>
      </div>

      <!-- resto dos cards continua igual -->

    </div>
  </div>

  <!-- HEALTH -->
  <div id="health-page" style="display:none;">

    <h1>Health 🚦</h1>

    <div class="card">
      <div class="title">STAGING</div>
      <div>🟢 API</div>
      <div>🟢 Auth</div>
      <div>🔴 Checkout</div>
      <div style="color:red; margin-top:10px;">
        Testes bloqueados
      </div>
    </div>

  </div>

</div>

<script>
function showPage(page) {
  document.getElementById('deeplinks-page').style.display =
    page === 'deeplinks' ? 'block' : 'none';

  document.getElementById('health-page').style.display =
    page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'deeplinks') document.querySelectorAll('.menu-item')[0].classList.add('active');
  if (page === 'health') document.querySelectorAll('.menu-item')[1].classList.add('active');
}
</script>

</body>
</html>
