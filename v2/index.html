<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* MENU */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

/* SEARCH */
.search {
  position: relative;
}

.search input {
  width: 100%;
  padding: 14px 14px 14px 38px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
  font-size: 16px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
}

/* GRID */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* REPORT */
.report-btn {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid #FCA5A5;
  background: #FEF2F2;
  color: #B91C1C;
  cursor: pointer;
}

/* HEALTH */
.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  display: flex;
  gap: 8px;
}

.header-right {
  display: flex;
  gap: 16px;
  align-items: center;
}

.arrow {
  cursor: pointer;
}

.services {
  display: none;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* WATERMARK */
.watermark {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94A3B8;
}
</style>
</head>

<body>

<div class="container">

<div class="menu">
<button class="menu-item active" onclick="showPage('home')">Home</button>
<button class="menu-item" onclick="showPage('deeplinks')">Deeplinks</button>
<button class="menu-item" onclick="showPage('health')">Health</button>
</div>

<div id="home-page">
<h1>QA Portal 🧪</h1>
<div class="grid">
<div class="card">
<div class="title">🔗 Deeplinks</div>
<button class="btn ios" onclick="showPage('deeplinks')">Acessar</button>
</div>
<div class="card">
<div class="title">🚦 Health</div>
<button class="btn android" onclick="showPage('health')">Ver status</button>
</div>
</div>
</div>

<div id="deeplinks-page" style="display:none;">
<h1>Deeplinks</h1>
<div class="search">
<span class="search-icon">🔍</span>
<input id="search" placeholder="Buscar..." />
</div>
<div class="grid" id="grid"></div>
</div>

<div id="health-page" style="display:none;">
<h1>Health 🚦</h1>
<div class="grid" id="health-grid"></div>
</div>

</div>

<div class="watermark">Desenvolvido por Chapter QA</div>

<script>

// NAV
function showPage(page) {
  document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
  document.getElementById('deeplinks-page').style.display = page === 'deeplinks' ? 'block' : 'none';
  document.getElementById('health-page').style.display = page === 'health' ? 'block' : 'none';
}

// ========================
// DEEPLINKS (NÃO ALTERAR)
// ========================
const deeplinks = [
  { title: "Produto", android: "#", ios: "#" },
  { title: "WebView", android: "#", ios: "#" },
  { title: "Coleção", android: "#", ios: "#" },
  { title: "Assinatura", android: "#", ios: "#" }
];

function render(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  list.forEach(item => {
    grid.innerHTML += `
      <div class="card">
        <div class="title">${item.title}</div>
        <div class="buttons">
          <a class="btn android">Android</a>
          <a class="btn ios">iOS</a>
        </div>
      </div>
    `;
  });
}

render(deeplinks);

// ========================
// HEALTH
// ========================
function loadHealth() {
  const grid = document.getElementById("health-grid");
  grid.innerHTML = `
    <div class="card">
      <div class="toggle">
        <div class="header-left">PRD 🟡</div>
        <div class="header-right">
          <button class="report-btn">Reportar</button>
          <div class="arrow">▶</div>
        </div>
      </div>
      <div class="services open">
        <div class="service">Home API <span>🟢</span></div>
        <div class="service">Fake OK <span>🟢</span></div>
        <div class="service">Fake FAIL <span>⚠️</span></div>
      </div>
    </div>
  `;
}

</script>

</body>
</html>
