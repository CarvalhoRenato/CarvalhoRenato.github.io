<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #F8FAFC;
  color: #0F172A;
  padding: 16px;
  margin: 0;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* MENU */
.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #E2E8F0;
  background: #FFFFFF;
  cursor: pointer;
}

.menu-item.active {
  background: #E0F2FE;
  border-color: #38BDF8;
  color: #0369A1;
}

.badge {
  margin-left: 6px;
}

/* SEARCH (🔥 AJUSTADO) */
.search {
  position: relative;
}

.search input {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 14px 14px 38px;
  border-radius: 14px;
  border: 1px solid #E2E8F0;
  font-size: 16px; /* 🔥 evita zoom no iOS */
}

/* 🔍 ícone */
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #94A3B8;
  font-size: 16px;
}

/* GRID */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #FFFFFF;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #E2E8F0;
}

.title {
  font-weight: 600;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: 500;
  border: none;
  cursor: pointer;
}

.android {
  background: #DCFCE7;
  color: #166534;
}

.ios {
  background: #F1F5F9;
  color: #334155;
}

/* HEALTH */
.toggle {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.arrow {
  transition: transform 0.2s;
}

.arrow.open {
  transform: rotate(90deg);
}

.services {
  display: none;
  margin-top: 10px;
}

.services.open {
  display: block;
}

.service {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* WATERMARK */
.watermark {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94A3B8;
}
</style>
</head>

<body>

<div class="container">

  <!-- MENU -->
  <div class="menu">
    <button class="menu-item active" onclick="showPage('home')">Home</button>
    <button class="menu-item" onclick="showPage('deeplinks')">Deeplinks</button>
    <button class="menu-item" onclick="showPage('health')">
      Health <span id="health-badge" class="badge"></span>
    </button>
  </div>

  <!-- HOME -->
  <div id="home-page">
    <h1>QA Portal 🧪</h1>
    <p style="color:#64748B;">
      Central de testes e validação de ambientes
    </p>

    <div class="grid">
      <div class="card">
        <div class="title">🔗 Deeplinks</div>
        <div class="buttons">
          <button class="btn ios" onclick="showPage('deeplinks')">Acessar</button>
        </div>
      </div>

      <div class="card">
        <div class="title">🚦 Health</div>
        <div class="buttons">
          <button class="btn android" onclick="showPage('health')">Ver status</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DEEPLINKS -->
  <div id="deeplinks-page" style="display:none;">
    <h1>Deeplinks</h1>

    <div class="search">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="Buscar..." />
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- HEALTH -->
  <div id="health-page" style="display:none;">
    <h1>Health 🚦</h1>
    <div class="grid" id="health-grid"></div>
  </div>

</div>

<div class="watermark">Desenvolvido por Chapter QA</div>

<script>
// NAV (inalterado)
function showPage(page) {
  document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
  document.getElementById('deeplinks-page').style.display = page === 'deeplinks' ? 'block' : 'none';
  document.getElementById('health-page').style.display = page === 'health' ? 'block' : 'none';

  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));

  if (page === 'home') document.querySelectorAll('.menu-item')[0].classList.add('active');
  if (page === 'deeplinks') document.querySelectorAll('.menu-item')[1].classList.add('active');

  if (page === 'health') {
    document.querySelectorAll('.menu-item')[2].classList.add('active');
    loadHealth();
  }
}

// RESTANTE DO JS (100% INTACTO)
